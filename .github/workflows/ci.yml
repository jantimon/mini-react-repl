name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# No job here writes to the repo — pin the token to read-only rather than
# inheriting the repo/org default (which a settings change could widen).
permissions:
  contents: read

# Cancel in-progress runs of the same workflow when a new commit lands
# on the same ref — saves CI minutes on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: typecheck + unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm format:check
      - run: pnpm lint
      # Re-link the `repl-vendor-build` workspace bin (skipped on the
      # first install because dist/vendor-builder/cli.js wasn't built
      # yet), then exercise the CLI on the custom-vendor example. This
      # populates `examples/custom-vendor/src/vendor.generated/` (which
      # is gitignored) so the next `pnpm typecheck` can resolve it, and
      # doubles as an end-to-end smoke test of `repl-vendor-build`.
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter custom-vendor build:vendor
      - run: pnpm typecheck
      - run: pnpm test

  build:
    name: library + examples build
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm --filter e2e-fixture build
      - run: pnpm --filter gh-pages build

  e2e:
    name: e2e (chromium)
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # Re-link workspace bins now that dist/ exists. The first install
      # warns + skips `repl-vendor-build` because `dist/vendor-builder/cli.js`
      # is built by `pnpm run build`, not present at install time.
      - run: pnpm install --frozen-lockfile

      # Cache the downloaded browser (~170 MB) keyed on the lockfile, so the
      # flaky cdn.playwright.dev download only runs on a genuine miss. Hangs
      # there once burned a full 6h against the runner ceiling.
      - name: cache playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: install playwright chromium (+ system deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 8
        run: pnpm exec playwright install --with-deps chromium

      # On a cache hit the browser binary is restored, but apt-level system
      # deps are not — install just those (fast; most are preinstalled).
      - name: install playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        timeout-minutes: 5
        run: pnpm exec playwright install-deps chromium

      - run: pnpm test:e2e
        timeout-minutes: 10

      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
